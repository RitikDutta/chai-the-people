<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="flex-grow flex flex-col items-center justify-center p-6 md:p-12">
<header class="text-center mb-10 w-full max-w-md">
<h1 class="font-headline italic font-bold text-4xl text-primary tracking-tight mb-2">Chai The People</h1>
<p class="font-body text-on-surface-variant tracking-widest text-sm uppercase">Scan, respond, sip.</p>
</header>
<section class="w-full max-w-md relative">
<div class="bg-surface-container-lowest rounded-xl overflow-hidden relative shadow-[0_4px_40px_rgba(30,27,23,0.04)]">
<div class="absolute inset-0 grain-overlay pointer-events-none"></div>
<div class="p-6 md:p-8 space-y-8">
<nav class="flex p-1 bg-surface-container rounded-full w-full">
<button class="flex-1 py-2 text-sm font-semibold rounded-full text-on-surface-variant transition-all duration-300">
                            Sign In
                        </button>
<button class="flex-1 py-2 text-sm font-semibold rounded-full bg-surface-container-lowest text-primary shadow-sm ring-1 ring-outline-variant/10 transition-all duration-300">
                            Create Account
                        </button>
</nav>
<div class="space-y-2">
<h2 class="font-headline text-2xl text-primary font-medium">Join the Steeping Room</h2>
<p class="text-on-surface-variant body-lg leading-relaxed">Join, answer surveys, and claim your free chai.</p>
</div>
<form class="space-y-6">
<div class="space-y-5">
<div class="group">
<label class="block text-xs font-bold text-on-surface-variant/70 uppercase tracking-widest mb-1 ml-1" for="name">Full Name</label>
<input class="w-full bg-surface-container-low border-0 border-b-1.5 border-outline-variant/15 focus:ring-0 focus:border-secondary focus:bg-surface-container-lowest transition-all duration-300 py-3 px-1 text-on-surface placeholder:text-on-surface-variant/40" id="name" placeholder="Arjun Singh" type="text"/>
</div>
<div class="group">
<label class="block text-xs font-bold text-on-surface-variant/70 uppercase tracking-widest mb-1 ml-1" for="email">Email</label>
<input class="w-full bg-surface-container-low border-0 border-b-1.5 border-outline-variant/15 focus:ring-0 focus:border-secondary focus:bg-surface-container-lowest transition-all duration-300 py-3 px-1 text-on-surface placeholder:text-on-surface-variant/40" id="email" placeholder="arjun@example.com" type="email"/>
</div>
<div class="group">
<label class="block text-xs font-bold text-on-surface-variant/70 uppercase tracking-widest mb-1 ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-1.5 border-outline-variant/15 focus:ring-0 focus:border-secondary focus:bg-surface-container-lowest transition-all duration-300 py-3 px-1 text-on-surface placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-start gap-3 px-1">
<div class="relative flex items-center mt-1">
<input class="peer h-5 w-5 rounded-lg border-outline-variant/30 text-secondary focus:ring-secondary/20 transition-all cursor-pointer bg-surface-container-low" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-snug cursor-pointer" for="terms">
                                I agree to the <span class="text-secondary font-semibold hover:underline decoration-secondary/30">terms</span> and <span class="text-secondary font-semibold hover:underline decoration-secondary/30">privacy policy</span>
</label>
</div>
<button class="w-full steeping-gradient text-on-primary py-4 px-6 rounded-xl font-bold tracking-wide shadow-lg hover:shadow-xl hover:translate-y-[-2px] transition-all duration-300 active:scale-[0.98]" type="submit">
                            Create Account
                        </button>
</form>
</div>
</div>
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-high/50 rounded-full backdrop-blur-sm">
<span class="material-symbols-outlined text-tertiary text-[18px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-xs font-bold text-on-surface-variant/80 tracking-wide uppercase">Secure &amp; Anonymized Participation</span>
</div>
<p class="text-sm text-on-surface-variant/60 font-medium">
                    Already have a cup? <a class="text-secondary underline decoration-secondary/30 underline-offset-4 font-bold" href="#">Sign In</a>
</p>
